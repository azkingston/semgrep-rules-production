rules:
  - id: autogen-insufficient-password-salt-rounds-ghsa-x2g5-fvc2-gqvp
    message: >-
      Insufficient bcrypt salt rounds detected. The default or hardcoded salt rounds value is below the OWASP recommended minimum of 10.
      Using low salt rounds (like 5) provides only 2^5=32 iterations, making password hashes vulnerable to brute-force attacks.
      Increase the salt rounds to at least 10 (recommended by OWASP) or 12 for better security. Replace hardcoded low values
      and ensure environment variable defaults are set to secure values like '10' or '12' instead of '5'.
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      version: "1.0"
      description: "Detects bcrypt salt rounds that are insufficient for secure password hashing"
      references:
        - "https://github.com/advisories/GHSA-x2g5-fvc2-gqvp"
        - "https://cwe.mitre.org/data/definitions/916.html"
        - "https://owasp.org/www-project-cheat-sheets/cheatsheets/Password_Storage_Cheat_Sheet.html"
      cwe:
        - "CWE-916: Use of Password Hash With Insufficient Computational Effort"
    pattern-either:
      - pattern: bcrypt.genSaltSync(parseInt(process.env.$VAR || '$VALUE'))
      - pattern: bcrypt.genSaltSync(parseInt(process.env.$VAR || "$VALUE"))
      - pattern: bcrypt.genSalt(parseInt(process.env.$VAR || '$VALUE'), ...)
      - pattern: bcrypt.genSalt(parseInt(process.env.$VAR || "$VALUE"), ...)
      - pattern: bcrypt.genSaltSync($ROUNDS)
      - pattern: bcrypt.genSalt($ROUNDS, ...)
      - pattern: bcrypt.hashSync($VALUE, bcrypt.genSaltSync($ROUNDS))
      - pattern: bcrypt.hash($VALUE, bcrypt.genSaltSync($ROUNDS), ...)
    metavariable-pattern:
      metavariable: $VALUE
      patterns:
        - pattern-either:
            - pattern: "'1'"
            - pattern: "'2'"
            - pattern: "'3'"
            - pattern: "'4'"
            - pattern: "'5'"
            - pattern: "'6'"
            - pattern: "'7'"
            - pattern: "'8'"
            - pattern: "'9'"
            - pattern: '"1"'
            - pattern: '"2"'
            - pattern: '"3"'
            - pattern: '"4"'
            - pattern: '"5"'
            - pattern: '"6"'
            - pattern: '"7"'
            - pattern: '"8"'
            - pattern: '"9"'
    metavariable-pattern:
      metavariable: $ROUNDS
      patterns:
        - pattern-either:
            - pattern: "1"
            - pattern: "2"
            - pattern: "3"
            - pattern: "4"
            - pattern: "5"
            - pattern: "6"
            - pattern: "7"
            - pattern: "8"
            - pattern: "9"