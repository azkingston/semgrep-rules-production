rules:
  - id: autogen-shell-misconfiguration-ghsa-6f6w-6j58-rq76
    message: >-
      Shell misconfiguration vulnerability detected in Shescape library. The shell configuration points to a symbolic link 
      that chains to another link, which can cause Shescape to misidentify the shell type and apply incorrect escaping rules. 
      This allows attackers to bypass shell escaping and potentially execute arbitrary commands or access sensitive information. 
      Upgrade to Shescape v2.1.9 or later, or ensure the shell path points directly to the shell executable without link chains.
    languages:
      - javascript
      - typescript
    severity: WARNING
    metadata:
      cve: GHSA-6f6w-6j58-rq76
      cwe: "CWE-78: OS Command Injection"
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      references:
        - https://github.com/ericcornelissen/shescape/security/advisories/GHSA-6f6w-6j58-rq76
    patterns:
      - pattern-either:
          - patterns:
              - pattern: new Shescape({ shell: $SHELL, ... })
              - metavariable-pattern:
                  metavariable: $SHELL
                  pattern-not: "..."
          - patterns:
              - pattern: new Shescape({ shell: $SHELL })
              - metavariable-pattern:
                  metavariable: $SHELL
                  pattern-not: "..."
          - patterns:
              - pattern: exec($CMD, { shell: $SHELL }, ...)
              - pattern-inside: |
                  $SHESCAPE = new Shescape({ shell: $SHELL_CONFIG, ... })
                  ...
          - patterns:
