rules:
  - id: autogen-remote-code-execution-ghsa-h343-gg57-2q67
    message: >-
      Remote Code Execution via Node.js vm module sandbox escape detected. User-controlled JavaScript code
      is being executed using vm.runInContext() without proper sandboxing. The Node.js vm module is not a
      security boundary and can be escaped using prototype chain manipulation (this.constructor.constructor)
      to access the underlying process object and execute arbitrary system commands. Use isolated-vm, a
      dedicated sandboxed container, or validate/restrict code execution to prevent RCE attacks.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cve: GHSA-h343-gg57-2q67
