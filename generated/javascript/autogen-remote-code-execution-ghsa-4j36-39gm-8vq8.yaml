              - pattern: vm.runInNewContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: vm.runInThisContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: vm.runInContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: $VM.runInNewContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: $VM.runInThisContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: $VM.runInContext($CODE, { ..., browser: $BROWSER, ... }, ...)
              - pattern: vm.runInNewContext($CODE, { ..., page: $PAGE, ... }, ...)
