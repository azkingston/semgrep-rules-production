rules:
  - id: autogen-remote-code-execution-ghsa-4j36-39gm-8vq8
    message: >-
      Remote Code Execution via exposed Playwright browser object detected. User-controlled code executed in vm
      context has access to live Playwright browser objects, allowing attackers to spawn arbitrary executables
      via browser.browserType().launch() with custom executablePath. This bypasses vm sandboxing by directly
      using exposed host capabilities. Remove dangerous host objects from vm context or use proper sandboxing
      that doesn't expose browser/page objects to untrusted code.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cve: GHSA-4j36-39gm-8vq8
      cwe: "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/OneUptime/oneuptime/security/advisories/GHSA-4j36-39gm-8vq8
    mode: taint
    pattern-sources:
