rules:
  - id: autogen-hardcoded-secrets-ghsa-c8m8-3jcr-6rj5
    message: >-
      Hardcoded JWT signing secret detected. The application is using a static hardcoded value as the JWT signing secret,
      which allows attackers who know this value to forge valid JWT tokens and bypass authentication. This is especially
      dangerous when using common default values like 'frangoteam751' that may be publicly known. Always use secure
      randomly generated secrets from environment variables or secure configuration files instead of hardcoded values.
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      cve: GHSA-c8m8-3jcr-6rj5
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/frangoteam/FUXA/security/advisories/GHSA-c8m8-3jcr-6rj5
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: "frangoteam751"
              - pattern: 'frangoteam751'
              - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              regex: '^"[^"]+"|^\'[^\']+\'$'
          - pattern-not: ""
          - pattern-not: ''
          - pattern-not: process.env.$VAR
          - pattern-not-inside: |
              function $FUNC(..., $SECRET, ...) {
                ...
              }
          - pattern-not-inside: |
              ($FUNC = (..., $SECRET, ...) => {
                ...
              })
      - patterns:
          - pattern-either:
              - pattern: $SECRET || "frangoteam751"
              - pattern: $SECRET || 'frangoteam751'
              - pattern: process.env.$VAR || "frangoteam751"
              - pattern: process.env.$VAR || 'frangoteam751'
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: jwt.sign($PAYLOAD, $SECRET, ...)
              - pattern: $JWT.sign($PAYLOAD, $SECRET, ...)
              - pattern: jsonwebtoken.sign($PAYLOAD, $SECRET, ...)
              - pattern: jose.SignJWT(...).sign($SECRET)
              - pattern: $JOSE.SignJWT(...).sign($SECRET)
              - pattern: new jose.SignJWT(...).sign($SECRET)
              - pattern: new $JOSE.SignJWT(...).sign($SECRET)
              - pattern: crypto.createHmac($ALG, $SECRET)
              - pattern: $CRYPTO.createHmac($ALG, $SECRET)
    pattern-sanitizers:
      - pattern: process.env.$VAR