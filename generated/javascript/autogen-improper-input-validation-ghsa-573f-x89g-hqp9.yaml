rules:
  - id: autogen-improper-input-validation-ghsa-573f-x89g-hqp9
    message: >-
      Fastify content-type validation vulnerability detected. The regex pattern for content-type validation is missing an end anchor ($),
      allowing malformed Content-Type headers with trailing garbage to pass validation. This can lead to requests being processed by
      unintended parsers. Fix by adding an end anchor to the regex pattern (e.g., change /application\/json/i to /^application\/json$/i)
      or upgrade Fastify to version 5.8.1 or later where this issue is resolved.
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      version: "1.0"
      description: "Detects Fastify content-type regex patterns missing end anchors that allow malformed headers to bypass validation"
      references:
        - "https://github.com/advisories/GHSA-573f-x89g-hqp9"
        - "https://cwe.mitre.org/data/definitions/20.html"
        - "https://httpwg.org/specs/rfc9110.html#field.content-type"
      cwe:
        - "CWE-20: Improper Input Validation"
    pattern-either:
      - pattern: |
          $APP.addContentTypeParser($REGEX, ...)
      - pattern: |
          $APP.addContentTypeParser('$TYPE', ...)
      - pattern: |
          fastify.addContentTypeParser($REGEX, ...)
      - pattern: |
          fastify.addContentTypeParser('$TYPE', ...)
      - pattern: |
          $INSTANCE.addContentTypeParser($REGEX, ...)
      - pattern: |
          $INSTANCE.addContentTypeParser('$TYPE', ...)
    metavariable-pattern:
      metavariable: $REGEX
      patterns:
        - pattern-either:
            - pattern-regex: "/application\\/json/[gi]*"
            - pattern-regex: "/text\\/.*/[gi]*"
            - pattern-regex: "/application\\/.*/[gi]*"
            - pattern-regex: "/multipart\\/.*/[gi]*"
        - pattern-not-regex: ".*\\$$"
    metavariable-pattern:
      metavariable: $TYPE
      patterns:
        - pattern-either:
            - pattern: "application/json"
            - pattern: "text/plain"
            - pattern: "application/xml"
            - pattern: "text/html"