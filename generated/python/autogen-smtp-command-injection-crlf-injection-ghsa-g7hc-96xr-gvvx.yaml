rules:
  - id: autogen-smtp-command-injection-/-crlf-injection-ghsa-g7hc-96xr-gvvx
    version: 1.0.0
    metadata:
      description: "Detects potential SMTP command injection vulnerability through CRLF injection in email addresses when using smtplib"
      severity: MODERATE
      references:
        - "https://github.com/advisories/GHSA-g7hc-96xr-gvvx"
        - "https://cwe.mitre.org/data/definitions/93.html"
        - "https://tools.ietf.org/html/rfc5321"
      category: security
      cwe:
        - "CWE-93: Improper Neutralization of CRLF Sequences ('CRLF Injection')"
        - "CWE-77: Improper Neutralization of Special Elements used in a Command ('Command Injection')"
      owasp:
        - "A03:2021 - Injection"
    message: "Potential SMTP command injection vulnerability detected. User-controlled input containing CRLF sequences (\\r\\n) is being used in SMTP operations without proper validation. This can allow attackers to inject additional SMTP commands, potentially leading to email forgery or unauthorized recipient manipulation. Validate and sanitize all email addresses by removing or rejecting CR/LF characters before using them in SMTP operations."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          import smtplib
          ...
          $SMTP = smtplib.$METHOD(...)
          ...
          $SMTP.sendmail($FROM, $TO, ...)
      - pattern: |
          import smtplib
          ...
          $SMTP = smtplib.$METHOD(...)
          ...
          $SMTP.send_message($MSG, $FROM, $TO, ...)
      - pattern: |
          from smtplib import $SMTP_CLASS
          ...
          $SMTP = $SMTP_CLASS(...)
          ...
          $SMTP.sendmail($FROM, $TO, ...)
      - pattern: |
          from smtplib import $SMTP_CLASS
          ...
          $SMTP = $SMTP_CLASS(...)
          ...
          $SMTP.send_message($MSG, $FROM, $TO, ...)
      - pattern: |
          $SMTP.mail($FROM)
      - pattern: |
          $SMTP.rcpt($TO)
    pattern-not-inside: |
      $VAR = $VAR.replace("\r", "").replace("\n", "")
      ...
    pattern-not-inside: |
      if "\r" in $VAR or "\n" in $VAR:
        ...
    pattern-not-inside: |
      $VAR = re.sub(r"[\r\n]", "", $VAR)
      ...