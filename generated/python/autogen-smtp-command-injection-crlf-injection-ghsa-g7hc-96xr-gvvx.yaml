rules:
  - id: autogen-smtp-command-injection-crlf-injection-ghsa-g7hc-96xr-gvvx
    mode: taint
    message: "SMTP command injection vulnerability detected via CRLF injection in email addresses. User-controlled input containing CRLF sequences (\\r\\n) can be injected into SMTP commands, allowing attackers to inject additional SMTP commands like RCPT TO, DATA, or RSET. This can lead to email forgery, unauthorized recipient manipulation, and mail redirection. Fix by: 1) Validate and sanitize all email addresses by rejecting or removing CR/LF characters before using them in SMTP operations, 2) Use email address validation libraries that enforce RFC 5321 compliance, 3) Implement input validation that blocks \\r and \\n characters in email address local parts, 4) Consider using parameterized email sending methods that properly escape special characters."
    languages: [python]
    severity: ERROR
