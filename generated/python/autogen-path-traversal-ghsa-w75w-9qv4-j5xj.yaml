rules:
  - id: autogen-path-traversal-ghsa-w75w-9qv4-j5xj
    version: 1.0.0
    message: |
      Potential path traversal vulnerability detected. Using `os.path.commonprefix()` for path validation is unsafe as it compares paths character-by-character rather than by path components. This allows attackers to write files to sibling directories with matching name prefixes. Replace with `os.path.commonpath()` which correctly compares paths by their components.
      
      Fix: Replace `os.path.commonprefix($PATHS)` with `os.path.commonpath($PATHS)`
    metadata:
      category: security
      technology:
        - python
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')"
      owasp:
        - A01:2021 - Broken Access Control
      references:
        - https://github.com/advisories/GHSA-w75w-9qv4-j5xj
        - https://cwe.mitre.org/data/definitions/22.html
        - https://docs.python.org/3/library/os.path.html#os.path.commonpath
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: os.path.commonprefix($PATHS)
          - pattern: |
              import os
              ...
              os.path.commonprefix($PATHS)
          - pattern: |
              from os.path import commonprefix
              ...
              commonprefix($PATHS)
          - pattern: |
              from os import path
              ...
              path.commonprefix($PATHS)
    pattern-inside:
      - pattern-either:
          - pattern: |
              def $FUNC(...):
                ...
                if $CONDITION:
                  ...
          - pattern: |
              def $FUNC(...):
                ...
                $VAR = ...
                ...
          - pattern: |
              def safe_extract(...):
                ...
          - pattern: |
              def extract(...):
                ...
    fix: |
      os.path.commonpath($PATHS)