rules:
  - id: autogen-server-side-request-forgery-ssrf-ghsa-595m-wc8g-6qgc
    mode: taint
    message: "SSRF vulnerability via HTTP redirect bypass detected. User-controlled URLs are passed to HTTP clients that follow redirects without validating redirect destinations, allowing attackers to bypass URL filtering and access internal services. Fix by: 1) Set allow_redirects=False in requests calls, 2) Implement custom redirect handling that validates each redirect destination, 3) Add host.docker.internal and Docker IP ranges to blocklists, 4) Validate all redirect Location headers against the same restrictions as initial URLs."
    languages: [python]
    severity: ERROR
    metadata:
      cve: GHSA-595m-wc8g-6qgc
