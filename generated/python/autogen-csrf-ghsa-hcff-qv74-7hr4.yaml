rules:
  - id: autogen-csrf-ghsa-hcff-qv74-7hr4
    version: 1.0.0
    metadata:
      description: "Detects CSRF vulnerability in login endpoint where credential-bearing requests are accepted without CSRF protection mechanisms"
      severity: MODERATE
      references:
        - "https://github.com/advisories/GHSA-hcff-qv74-7hr4"
        - "https://cwe.mitre.org/data/definitions/352.html"
        - "https://owasp.org/Top10/A01_2021-Broken_Access_Control/"
      category: security
      cwe:
        - "CWE-352: Cross-Site Request Forgery (CSRF)"
      owasp:
        - "A01:2021 - Broken Access Control"
    message: "CSRF vulnerability detected in login endpoint: credential-bearing requests are processed without CSRF protection, allowing attackers to force victim browsers into sessions with known credentials. This can cause user confusion, activity misattribution, and potential misuse of trusted user actions. Fix by implementing CSRF protection mechanisms such as: 1) Add CSRF tokens to login forms and validate them on submission, 2) Use SameSite cookie attributes, 3) Implement proper session management with CSRF tokens tied to browser session context, 4) Validate Origin/Referer headers for state-changing requests."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          @$DECORATOR("/login", methods=["POST"])
          def login(...):
              ...
              $USERNAME = request.form.get("username")
              $PASSWORD = request.form.get("password")
              ...
              if authenticate($USERNAME, $PASSWORD):
                  session[$KEY] = $VALUE
                  ...
      - pattern: |
          @$APP.route("/login", methods=["POST"])
          def $FUNC(...):
              ...
              $CREDENTIALS = request.form
              ...
              session["user_id"] = $USER_ID
              ...
      - pattern: |
          def login(...):
              ...
              $USER = request.form.get("user")
              $PASS = request.form.get("password")
              ...
              if verify_credentials($USER, $PASS):
                  session[$SESSION_KEY] = $SESSION_VALUE
                  ...
      - pattern: |
          @route("/login")
          def $HANDLER(...):
              ...
              if request.method == "POST":
                  ...
                  $AUTH_DATA = request.form
                  ...
                  create_session($USER)
                  ...
      - pattern: |
          def handle_login(...):
              ...
              $FORM_DATA = request.form
              ...
              if login_valid($FORM_DATA):
                  session.permanent = True
                  session["authenticated"] = True
                  ...
