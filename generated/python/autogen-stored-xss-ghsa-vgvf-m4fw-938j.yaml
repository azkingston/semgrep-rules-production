rules:
  - id: autogen-stored-xss-ghsa-vgvf-m4fw-938j
    version: 1.0.0
    metadata:
      description: "Detects stored XSS vulnerability where author/committer names are rendered without proper HTML escaping in branch and wiki views"
      severity: MODERATE
      references:
        - "https://github.com/advisories/GHSA-vgvf-m4fw-938j"
        - "https://github.com/gogs/gogs/releases/tag/v0.14.2"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A03:2021 - Injection"
    message: "Stored XSS vulnerability detected: author/committer names from git metadata are being rendered in HTML contexts without proper escaping, allowing stored XSS attacks through commit metadata injection. This can lead to session hijacking, CSRF token theft, and unauthorized actions. Fix by: 1) HTML-escape all user-controlled git metadata (author names, committer names) before rendering, 2) Remove or restrict unsafe template functions that bypass escaping, 3) Implement Content Security Policy (CSP) to block data URLs, 4) Sanitize git metadata on input with strict allowlists."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          def $FUNC(...):
              ...
              $AUTHOR = $COMMIT.author.name
              ...
              return render_template($TEMPLATE, author_name=$AUTHOR, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $COMMITTER = $COMMIT.committer.name
              ...
              return render_template($TEMPLATE, committer_name=$COMMITTER, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $COMMIT_DATA = {"author": $COMMIT.author.name, ...}
              ...
              return render_template($TEMPLATE, commit=$COMMIT_DATA, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $COMMIT_DATA = {"committer": $COMMIT.committer.name, ...}
              ...
              return render_template($TEMPLATE, commit=$COMMIT_DATA, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $BRANCHES = []
              for $BRANCH in $BRANCH_LIST:
                  ...
                  $BRANCHES.append({"author": $BRANCH.commit.author.name, ...})
              ...
              return render_template($TEMPLATE, branches=$BRANCHES, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $HTML = f"<span class='author'>{$COMMIT.author.name}</span>"
              ...
      - pattern: |
          def $FUNC(...):
              ...
              $HTML = f"<span class='committer'>{$COMMIT.committer.name}</span>"
              ...
      - pattern: |
          def $FUNC(...):
              ...
              return render_template_string($TEMPLATE_STR, author=$COMMIT.author.name, ...)
      - pattern: |
          def $FUNC(...):
              ...
              return render_template_string($TEMPLATE_STR, committer=$COMMIT.committer.name, ...)
      - pattern: |
          @$APP.route("/branches")
          def $FUNC(...):
              ...
              $COMMITS = $REPO.get_commits()
              ...
              return render_template($TEMPLATE, commits=$COMMITS, ...)
      - pattern: |
