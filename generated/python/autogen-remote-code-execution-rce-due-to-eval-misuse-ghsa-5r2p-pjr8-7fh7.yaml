rules:
  - id: autogen-remote-code-execution-(rce)-due-to-eval-misuse-ghsa-5r2p-pjr8-7fh7
    version: 1.0.0
    metadata:
      description: "Detects potential RCE vulnerability in SageMaker Python SDK JumpStart search functionality due to eval() misuse"
      severity: HIGH
      references:
        - "https://github.com/advisories/GHSA-5r2p-pjr8-7fh7"
        - "https://github.com/aws/sagemaker-python-sdk/pull/5497"
        - "https://pypi.org/project/sagemaker/3.4.0/"
      category: security
      cwe:
        - "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      owasp:
        - "A03:2021 - Injection"
    message: "Potential Remote Code Execution (RCE) vulnerability detected in SageMaker Python SDK search_hub() function. The function may use eval() to process query parameters, allowing arbitrary code execution if untrusted input is passed. Fix by: 1) Upgrade to SageMaker Python SDK version 3.4.0 or later which replaces eval() with a safe recursive descent parser, 2) Sanitize and validate all input to the search_hub() query parameter to ensure only expected formats are processed, 3) Never pass untrusted user input directly to search_hub() without proper validation."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          from sagemaker.jumpstart import $MOD
          ...
          $MOD.search_hub($QUERY, ...)
      - pattern: |
          import sagemaker.jumpstart.$MOD
          ...
          sagemaker.jumpstart.$MOD.search_hub($QUERY, ...)
      - pattern: |
          from sagemaker.jumpstart.$MOD import search_hub
          ...
          search_hub($QUERY, ...)
      - pattern: |
          import sagemaker
          ...
          sagemaker.jumpstart.$MOD.search_hub($QUERY, ...)
      - pattern: |
          from sagemaker.jumpstart.hub import search_hub
          ...
          search_hub($QUERY, ...)
      - pattern: |
          import sagemaker.jumpstart.hub as $HUB
          ...
          $HUB.search_hub($QUERY, ...)
      - pattern: |
          from sagemaker.jumpstart.hub import *
          ...
          search_hub($QUERY, ...)
    pattern-not: |
      $FUNC.search_hub("...", ...)