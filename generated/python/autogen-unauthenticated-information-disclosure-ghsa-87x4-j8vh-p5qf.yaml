rules:
  - id: autogen-unauthenticated-information-disclosure-ghsa-87x4-j8vh-p5qf
    version: 1.0.0
    metadata:
      description: "Detects Django REST Framework ViewSets with potential unauthenticated access to sensitive member/user information"
      severity: HIGH
      references:
        - "https://github.com/advisories/GHSA-87x4-j8vh-p5qf"
        - "https://github.com/makeplane/plane/releases/tag/v1.2.3"
        - "https://cwe.mitre.org/data/definitions/862.html"
      category: security
      cwe:
        - "CWE-862: Missing Authorization"
      owasp:
        - "A01:2021 - Broken Access Control"
    message: "Potential unauthenticated information disclosure vulnerability detected. Django REST Framework ViewSet handling member/user data may allow anonymous access to sensitive information including email addresses and user roles. Ensure proper authentication and permission classes are configured (e.g., IsAuthenticated, IsOwner) and remove AllowAny permission class from endpoints that expose sensitive user data."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          class $CLASS(viewsets.$VIEWSET):
              ...
              permission_classes = [AllowAny]
              ...
              def list(self, ...):
                  ...
      - pattern: |
          class $CLASS(viewsets.$VIEWSET):
              ...
              permission_classes = (AllowAny,)
              ...
              def list(self, ...):
                  ...
      - pattern: |
          class $CLASS(viewsets.$VIEWSET):
              ...
              permission_classes = [permissions.AllowAny]
              ...
              def list(self, ...):
                  ...
      - pattern: |
          class $CLASS(viewsets.$VIEWSET):
              ...
              permission_classes = (permissions.AllowAny,)
              ...
              def list(self, ...):
                  ...
      - pattern: |
          @permission_classes([AllowAny])
          class $CLASS(viewsets.$VIEWSET):
              ...
              def list(self, ...):
                  ...
      - pattern: |
          @permission_classes([permissions.AllowAny])
          class $CLASS(viewsets.$VIEWSET):
              ...
              def list(self, ...):
                  ...
    pattern-inside: |
      class $CLASS(...):
          ...
    pattern-where:
      - metavariable-regex:
          metavariable: $CLASS
          regex: .*(Member|User|Workspace).*
    pattern-not-inside: |
      class $CLASS(viewsets.$VIEWSET):
          ...
          permission_classes = [..., IsAuthenticated, ...]
          ...
    pattern-not-inside: |
      class $CLASS(viewsets.$VIEWSET):
          ...
          permission_classes = [..., permissions.IsAuthenticated, ...]
          ...