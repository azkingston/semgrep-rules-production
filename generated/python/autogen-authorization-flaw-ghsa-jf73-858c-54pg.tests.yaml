def get_dashboard(self, request):
    dashboard_actions = []
    for action_id, binding in self.action_bindings.items():
        if binding.hidden:
            continue
        action_data = self.build_action_metadata(binding, request.user)
        dashboard_actions.append(action_data)
# ruleid: autogen-authorization-flaw-ghsa-jf73-858c-54pg
    return {'actions': dashboard_actions}

# TP-2: Action binding endpoint returns metadata without checking view permissions - only validates exec permission
# Accuracy result: MISS ❌
def get_action_binding(self, binding_id, user):
    binding = self.action_bindings.get(binding_id)
    if not binding:
        return None
    # Only checks exec permission, missing view permission check
    can_exec = self.acl.is_allowed_exec(user, binding_id)
    return {
        'bindingId': binding_id,
        'title': binding.title,
        'icon': binding.icon,
        'description': binding.description,
        'canExec': can_exec,
        'arguments': binding.arguments
# ruleid: autogen-authorization-flaw-ghsa-jf73-858c-54pg
