rules:
  - id: autogen-privilege-escalation-ghsa-p443-p7w5-2f7f
    version: 1.0.0
    metadata:
      description: "Detects privilege escalation vulnerability where RestartAction creates new requests without preserving authentication context, causing fallback to guest permissions"
      severity: MEDIUM
      references:
        - "https://github.com/advisories/GHSA-p443-p7w5-2f7f"
        - "https://cwe.mitre.org/data/definitions/269.html"
      category: security
      cwe:
        - "CWE-269: Improper Privilege Management"
      owasp:
        - "A01:2021 - Broken Access Control"
    message: "Privilege escalation vulnerability detected: RestartAction creates new internal requests without preserving original caller's authentication headers or cookies. When passed to StartAction, authentication resolver falls back to guest user, potentially granting broader permissions than the authenticated caller. This allows low-privileged users to bypass ACL restrictions and execute unauthorized actions. Fix by preserving authentication context when creating new requests or explicitly validating permissions before action execution."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          def restart_action($CTX, $REQ, ...):
              ...
              $EXEC_REQ_LOG_ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              return start_action($CTX, {
                  "binding_id": $EXEC_REQ_LOG_ENTRY.get_binding_id(),
                  "unique_tracking_id": $REQ.get("execution_tracking_id"),
                  ...
              })
      - pattern: |
          def restart_action($CTX, $REQ, ...):
              ...
              $EXEC_REQ_LOG_ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              $NEW_REQUEST = {
                  "binding_id": $EXEC_REQ_LOG_ENTRY.get_binding_id(),
                  "unique_tracking_id": $REQ.get("execution_tracking_id"),
                  ...
              }
              ...
              return start_action($CTX, $NEW_REQUEST)
      - pattern: |
          def restart_action(...):
              ...
              $NEW_REQ = create_request({
                  "binding_id": $EXEC_REQ_LOG_ENTRY.get_binding_id(),
                  "unique_tracking_id": $TRACKING_ID,
                  ...
              })
              ...
              return start_action($CTX, $NEW_REQ)
      - pattern: |
          def restart_action(...):
              ...
              return start_action($CTX, StartActionRequest(
                  binding_id=$EXEC_REQ_LOG_ENTRY.get_binding_id(),
                  unique_tracking_id=$TRACKING_ID,
                  ...
              ))
      - pattern: |
          def $RESTART_FUNC(...):
              ...
              $EXEC_REQ_LOG_ENTRY = get_execution_log_entry($TRACKING_ID)
              ...
              return $START_FUNC($CTX, {
                  "binding_id": $EXEC_REQ_LOG_ENTRY.binding_id,
                  "unique_tracking_id": $TRACKING_ID
              })
    pattern-not-inside: |
      def restart_action(...):
          ...
          $USER = user_from_api_call($CTX, $REQ, ...)
          ...
          if not is_allowed_exec($USER, ...):
              ...
          ...
    pattern-not-inside: |
      def restart_action(...):
          ...
          $NEW_REQ = create_request_with_auth($REQ, ...)
          ...
    pattern-not-inside: |
      def restart_action(...):
          ...
          $NEW_REQ["headers"] = $REQ.get("headers", {})
          $NEW_REQ["cookies"] = $REQ.get("cookies", {})
          ...