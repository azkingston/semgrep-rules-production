rules:
  - id: autogen-command-injection-ghsa-v9vm-r24h-6rqm
    version: 1.0.0
    metadata:
      description: "Detects command injection vulnerability where user-controlled tag names are passed to git commands without proper option separation"
      severity: HIGH
      references:
        - "https://github.com/advisories/GHSA-v9vm-r24h-6rqm"
        - "https://cwe.mitre.org/data/definitions/78.html"
      category: security
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A03:2021 - Injection"
    message: "Command injection vulnerability detected: user-controlled tag names are being passed to git commands without proper option separation, allowing git option injection when tag names start with dashes. This can cause command failures, unexpected behavior, or operational denial of service. Fix by: 1) Add '--' or '--end-of-options' separator before user input in git commands, 2) Use safe git wrapper functions that handle options properly, 3) Validate tag names to prevent dash prefixes, 4) Audit all git command invocations for similar issues."
    languages:
      - python
    severity: ERROR
    pattern-either:
