      - pattern: |
          subprocess.Popen(["git", "tag", "-d", $TAG_NAME])
      - pattern: |
          subprocess.Popen(["git", "tag", "-d", $RELEASE.tag_name])
      - pattern: |
          os.system(f"git tag -d {$TAG_NAME}")
      - pattern: |
