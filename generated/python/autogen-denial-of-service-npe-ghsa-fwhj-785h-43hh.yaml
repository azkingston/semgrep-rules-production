      owasp:
        - "A06:2021 - Vulnerable and Outdated Components"
    message: "Denial of service vulnerability detected: API handlers are dereferencing execution log entry bindings without null checks, causing NPE when invalid tracking IDs create entries with nil bindings. This allows unauthenticated attackers to trigger server panics. Fix by adding null checks for execReqLogEntry.Binding before dereferencing execReqLogEntry.Binding.Action, and validate tracking IDs properly before performing operations."
    languages:
      - python
    severity: ERROR
    pattern-either:
