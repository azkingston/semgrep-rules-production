              ...
              $ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              $ACTION = $ENTRY.binding.action
              ...
      - pattern: |
          def restart_action($REQUEST, ...):
              ...
              $ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              $ACTION = $ENTRY.binding.action
              ...
      - pattern: |
          def $FUNC(...):
              ...
              $TRACKING_ID = $REQUEST.get("execution_tracking_id")
              ...
              $ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              $ENTRY.binding.action.$ATTR
              ...
      - pattern: |
          def $FUNC(...):
              ...
              $TRACKING_ID = $REQUEST["executionTrackingId"]
              ...
              $ENTRY = $EXECUTOR.get_log_entry($TRACKING_ID)
              ...
              $ENTRY.binding.action.$ATTR
              ...
      - pattern: |
