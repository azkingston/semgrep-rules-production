    version: 1.0.0
    metadata:
      description: "Detects denial of service vulnerability where API handlers dereference binding without null checks, causing NPE when invalid tracking IDs are used"
      severity: MEDIUM
      references:
        - "https://github.com/advisories/GHSA-fwhj-785h-43hh"
