    message: "Information disclosure vulnerability detected in health endpoint. The endpoint exposes sensitive system information including OS version, Python version, CPU count, memory details, disk usage, and database paths without proper authentication. This enables OS fingerprinting, resource enumeration, and path disclosure for reconnaissance attacks. Fix by: 1) Remove sensitive system details from health endpoints, 2) Require authentication for detailed health information, 3) Avoid exposing database_path or other filesystem details, 4) Bind to 127.0.0.1 instead of 0.0.0.0 by default."
