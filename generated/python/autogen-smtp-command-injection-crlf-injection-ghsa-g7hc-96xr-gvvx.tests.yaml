import MimeKit
from MailKit.Net.Smtp import SmtpClient

def send_email(from_address, to_address, subject, body):
    # Vulnerable: user-controlled from_address with potential CRLF
    envelope_from = MimeKit.MailboxAddress('', from_address)
    envelope_to = MimeKit.MailboxAddress('', to_address)
    
    message = MimeKit.MimeMessage()
    message.From.Add(envelope_from)
    message.To.Add(envelope_to)
    message.Subject = subject
    message.Body = MimeKit.TextPart('plain') { Text = body }
    
    with SmtpClient() as client:
        client.Send(message, envelope_from, [envelope_to])

