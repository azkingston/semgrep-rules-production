import requests

def import_document_via_url(url):
    # Initial URL validation
    if not is_ssrf_safe_url(url):
        raise ValueError('Invalid URL')
    
    # Vulnerable: follows redirects without validation
    response = requests.get(url)
    return response.content

def is_ssrf_safe_url(url):
    # Only validates initial URL, not redirect targets
# ruleid: autogen-server-side-request-forgery-ssrf-ghsa-595m-wc8g-6qgc
    return not any(host in url for host in ['localhost', '127.0.0.1'])

