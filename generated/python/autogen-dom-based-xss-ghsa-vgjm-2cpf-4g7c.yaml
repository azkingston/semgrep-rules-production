rules:
  - id: autogen-dom-based-xss-ghsa-vgjm-2cpf-4g7c
    message: "DOM-based XSS vulnerability detected: milestone names are being rendered in HTML contexts without proper escaping, allowing stored XSS attacks. This can lead to session hijacking, CSRF token theft, and unauthorized repository operations. Fix by: 1) HTML-escape all milestone names before rendering in templates (use html.escape() or template auto-escaping), 2) Sanitize milestone names on input with bleach.clean(), 3) Implement Content Security Policy (CSP), 4) Validate milestone names to reject HTML/JavaScript content."
    languages: [python]
    severity: ERROR
    metadata:
      cve: GHSA-vgjm-2cpf-4g7c
      cwe: "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/gogs/gogs/security/advisories/GHSA-vgjm-2cpf-4g7c
        - https://github.com/gogs/gogs/releases/tag/v0.14.2
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: $MILESTONE.name
          - pattern: $MILESTONE.title
          - pattern: $REQUEST.form.get("milestone")
          - pattern: $REQUEST.form.get("milestone_name")
          - pattern: $REQUEST.args.get("milestone")
          - pattern: $REQUEST.json.get("milestone")
    pattern-sinks:
