rules:
  - id: autogen-dom-based-xss-ghsa-vgjm-2cpf-4g7c
    version: 1.0.0
    metadata:
      description: "Detects DOM-based XSS vulnerability in Gogs-like applications where milestone names are rendered without proper HTML escaping"
      severity: HIGH
      references:
        - "https://github.com/advisories/GHSA-vgjm-2cpf-4g7c"
        - "https://github.com/gogs/gogs/releases/tag/v0.14.2"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A03:2021 - Injection"
    message: "DOM-based XSS vulnerability detected: milestone names or similar user input are being rendered in HTML contexts without proper escaping, allowing stored XSS attacks. This can lead to session hijacking, CSRF token theft, and unauthorized repository operations. Fix by: 1) HTML-escape all user-controlled data before rendering in DOM, 2) Use template engines with automatic escaping, 3) Implement Content Security Policy (CSP), 4) Validate and sanitize milestone names on input and output."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          def $FUNC(...):
              ...
              $MILESTONE = $REQUEST.form.get("milestone")
              ...
              return render_template($TEMPLATE, milestone_name=$MILESTONE, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $MILESTONE = $DB.query(...).filter(...milestone...).first()
              ...
              return render_template($TEMPLATE, milestone=$MILESTONE.name, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $MILESTONE_NAME = $MILESTONE.name
              ...
              return render_template_string($TEMPLATE_STR, milestone_name=$MILESTONE_NAME, ...)
      - pattern: |
          @$APP.route("/issues/new")
          def $FUNC(...):
              ...
              $MILESTONES = $MODEL.query.all()
              ...
              return render_template($TEMPLATE, milestones=$MILESTONES, ...)
      - pattern: |
          def $FUNC(...):
              ...
              $HTML = f"<option value='{$MILESTONE.id}'>{$MILESTONE.name}</option>"
              ...
      - pattern: |
          def $FUNC(...):
              ...
              $MILESTONE_DATA = {"name": $MILESTONE.name, ...}
              ...
              return jsonify($MILESTONE_DATA)
      - pattern: |
          def get_milestones(...):
              ...
              $MILESTONES = [{"name": $M.name, ...} for $M in $MILESTONE_LIST]
              ...
              return $MILESTONES
    pattern-not-inside: |
      def $FUNC(...):
          ...
          $MILESTONE_NAME = escape($MILESTONE.name)
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          $MILESTONE_NAME = html.escape($MILESTONE.name)
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          $MILESTONE_NAME = bleach.clean($MILESTONE.name)
          ...