rules:
  - id: autogen-privilege-escalation-ghsa-m2hx-wjxc-9fp4
    version: 1.0.0
    metadata:
      description: "Detects privilege escalation vulnerability where registered users without file creation privileges can generate API keys with elevated permissions"
      severity: MODERATE
      references:
        - "https://github.com/advisories/GHSA-m2hx-wjxc-9fp4"
        - "https://cwe.mitre.org/data/definitions/269.html"
      category: security
      cwe:
        - "CWE-269: Improper Privilege Management"
      owasp:
        - "A01:2021 - Broken Access Control"
    message: "Privilege escalation vulnerability detected: registered users without file creation/modification privileges can generate short-lived API keys with elevated permissions to create or modify file requests. This allows unauthorized access to administrative functions through API key abuse. Fix by implementing proper permission validation when generating API keys: 1) Check user's actual permissions before granting API key privileges, 2) Ensure API keys inherit same permission limitations as the creating user, 3) Validate that users have necessary privileges before allowing API key creation with elevated permissions, 4) Implement proper authorization checks in API key generation endpoints."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          def create_api_key($USER, ...):
              ...
              $API_KEY = {
                  ...,
                  "permissions": ["create_file_requests", ...],
                  ...
              }
              ...
      - pattern: |
          def generate_api_key($USER_ID, ...):
              ...
              $PERMISSIONS = ["modify_file_requests", "create_file_requests", ...]
              ...
              return create_token($USER_ID, permissions=$PERMISSIONS)
      - pattern: |
          def create_user_api_key(...):
              ...
              $KEY_PERMS = get_default_api_permissions()
              ...
              $API_KEY = ApiKey(
                  user_id=$USER_ID,
                  permissions=$KEY_PERMS
              )
              ...
      - pattern: |
          @$DECORATOR("/api/create-key", ...)
          def $HANDLER(...):
              ...
              $USER = get_current_user()
              ...
              $API_KEY = generate_token(
                  user=$USER,
                  permissions=["file_request_create", "file_request_modify", ...]
              )
              ...
      - pattern: |
          def $FUNC(...):
              ...
              $API_TOKEN = create_api_token($USER, {
                  "can_create_files": True,
                  "can_modify_requests": True,
                  ...
              })
              ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          if not $USER.has_permission("create_file_requests"):
              raise PermissionError("Insufficient privileges")
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          if not user_can_create_files($USER):
              abort(403)
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          $USER_PERMS = get_user_permissions($USER)
          $API_PERMS = filter_permissions_by_user($USER_PERMS, $REQUESTED_PERMS)
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          validate_user_privileges($USER, $REQUESTED_PERMISSIONS)
          ...