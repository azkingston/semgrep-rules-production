rules:
  - id: autogen-memory-leak-ghsa-xxh7-fcf3-rj7f
    message: "Memory leak vulnerability detected in Jetty GzipHandler implementation. GzipRequest objects with inflated content may not have destroy() called when deflation is not needed, causing Inflator objects to leak native memory and potentially crash the JVM with OOME. Fix by: 1) Always wrap callbacks when GzipRequest is created, not just when deflation is needed, 2) Ensure GzipRequest.destroy() is called in all code paths after request processing, 3) Use try/finally blocks or context managers to guarantee cleanup, 4) Upgrade to a patched version of Jetty when available."
    languages: [python]
    severity: ERROR
    metadata:
      cve: GHSA-xxh7-fcf3-rj7f
      cwe: "CWE-401: Missing Release of Memory after Effective Lifetime"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - "https://github.com/advisories/GHSA-xxh7-fcf3-rj7f"
        - "https://github.com/jetty/jetty.project/issues/14260"
        - "https://gitlab.eclipse.org/security/cve-assignment/-/issues/79"
