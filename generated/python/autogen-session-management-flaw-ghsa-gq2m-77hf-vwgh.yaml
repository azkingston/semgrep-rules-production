rules:
  - id: autogen-session-management-flaw-ghsa-gq2m-77hf-vwgh
    message: "Session management flaw detected: logout function only clears client-side cookie without invalidating server-side session storage. This allows attackers with stolen session cookies to continue authenticating after logout, resulting in session fixation vulnerability. Fix by removing the session ID from session storage (e.g., del session_storage.providers[provider].sessions[sid]) or calling session.invalidate() to properly destroy server-side session data during logout."
    languages: [python]
    severity: ERROR
    metadata:
      cve: GHSA-gq2m-77hf-vwgh
      cwe: "CWE-384: Session Fixation"
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      references:
        - https://github.com/OliveTin/OliveTin/security/advisories/GHSA-gq2m-77hf-vwgh
    patterns:
      - pattern-either:
          - patterns:
              - pattern-inside: |
                  def $LOGOUT_FUNC(...):
                      ...
              - pattern-either:
                  - pattern: $RESPONSE.headers["Set-Cookie"] = $COOKIE_STRING
                  - pattern: $RESPONSE.set_cookie($COOKIE_NAME, value="", ...)
