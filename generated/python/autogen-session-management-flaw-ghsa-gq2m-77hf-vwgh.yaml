rules:
  - id: autogen-session-management-flaw-ghsa-gq2m-77hf-vwgh
    version: 1.0.0
    metadata:
      description: "Detects session management flaw where logout fails to invalidate server-side sessions, allowing session fixation attacks"
      severity: MEDIUM
      references:
        - "https://github.com/advisories/GHSA-gq2m-77hf-vwgh"
        - "https://cwe.mitre.org/data/definitions/384.html"
      category: security
      cwe:
        - "CWE-384: Session Fixation"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
    message: "Session management flaw detected: logout endpoint only clears client-side cookie without invalidating server-side session storage. This allows attackers with stolen session cookies to continue authenticating after logout, resulting in session fixation vulnerability. Fix by removing the session ID from session_storage.providers[provider].sessions[sid] during logout or calling session.invalidate() to properly destroy server-side session data."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          def logout(...):
              ...
              $RESPONSE.headers["Set-Cookie"] = $COOKIE_STRING
              ...
      - pattern: |
          def logout(...):
              ...
              $RESPONSE.set_cookie($COOKIE_NAME, value="", expires=...)
              ...
      - pattern: |
          def $LOGOUT_FUNC(...):
              ...
              $COOKIE = create_cookie($NAME, value="", max_age=...)
              ...
              $RESPONSE.headers.set("Set-Cookie", $COOKIE)
              ...
      - pattern: |
          def $LOGOUT_FUNC(...):
              ...
              clear_cookie($RESPONSE, $COOKIE_NAME)
              ...
      - pattern: |
          def $LOGOUT_FUNC(...):
              ...
              $RESPONSE.delete_cookie($COOKIE_NAME)
              ...
    pattern-not-inside: |
      def $LOGOUT_FUNC(...):
          ...
          del session_storage.providers[$PROVIDER].sessions[$SID]
          ...
    pattern-not-inside: |
      def $LOGOUT_FUNC(...):
          ...
          session_storage.remove_session($SID)
          ...
    pattern-not-inside: |
      def $LOGOUT_FUNC(...):
          ...
          $SESSION.invalidate()
          ...
    pattern-not-inside: |
      def $LOGOUT_FUNC(...):
          ...
          session_storage.providers[$PROVIDER].sessions.pop($SID, None)
          ...