rules:
  - id: autogen-information-disclosure-ghsa-x9p5-w45c-7ffc
    version: 1.0.0
    metadata:
      description: "Detects information disclosure vulnerability where access tokens are exposed through URL parameters in API requests"
      severity: MODERATE
      references:
        - "https://github.com/advisories/GHSA-x9p5-w45c-7ffc"
        - "https://cwe.mitre.org/data/definitions/200.html"
      category: security
      cwe:
        - "CWE-200: Information Exposure"
      owasp:
        - "A01:2021 - Broken Access Control"
    message: "Information disclosure vulnerability detected: access tokens are being accepted through URL parameters which can leak through logs, browser history, and referrer headers. This allows tokens to be reused until revoked and exposes authentication credentials. Fix by: 1) Use authentication headers exclusively for token transmission, 2) Block token parameters at proxy/WAF level, 3) Remove token and access_token query parameter handling from authentication code, 4) Scrub query strings from logs, 5) Set strict referrer policy to prevent token leakage through referrer headers."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          $TOKEN = request.args.get("token")
          ...
          if $TOKEN:
              authenticate($TOKEN)
      - pattern: |
          $TOKEN = request.args.get("access_token")
          ...
          if $TOKEN:
              authenticate($TOKEN)
      - pattern: |
          $TOKEN = $REQUEST.args.get("token")
          ...
          if $TOKEN:
              $AUTH_RESULT = verify_token($TOKEN)
      - pattern: |
          $TOKEN = $REQUEST.args.get("access_token")
          ...
          if $TOKEN:
              $AUTH_RESULT = verify_token($TOKEN)
      - pattern: |
          def get_auth_token($REQUEST):
              ...
              $TOKEN = $REQUEST.args.get("token")
              ...
              return $TOKEN
      - pattern: |
          def get_auth_token($REQUEST):
              ...
              $TOKEN = $REQUEST.args.get("access_token")
              ...
              return $TOKEN
      - pattern: |
          $TOKEN = $CTX.query("token")
          ...
          if $TOKEN:
              $USER = authenticate_token($TOKEN)
      - pattern: |
          $TOKEN = $CTX.query("access_token") 
          ...
          if $TOKEN:
              $USER = authenticate_token($TOKEN)
      - pattern: |
          def authenticate_request($REQUEST):
              ...
              $TOKEN = $REQUEST.args.get("token") or $REQUEST.headers.get("Authorization")
              ...
      - pattern: |
          def authenticate_request($REQUEST):
              ...
              $TOKEN = $REQUEST.args.get("access_token") or $REQUEST.headers.get("Authorization")
              ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          if "token" in request.args:
              return abort(400, "Token in URL not allowed")
          ...
    pattern-not-inside: |
      def $FUNC(...):
          ...
          if "access_token" in request.args:
              return abort(400, "Access token in URL not allowed")
          ...