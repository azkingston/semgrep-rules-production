rules:
  - id: autogen-stored-xss-ghsa-xrcr-gmf5-2r8j
    version: 1.0.0
    metadata:
      description: "Detects stored XSS vulnerability where HTML sanitizer allows data URI schemes, enabling JavaScript execution via malicious data URLs in comments and content"
      severity: HIGH
      references:
        - "https://github.com/advisories/GHSA-xrcr-gmf5-2r8j"
        - "https://cwe.mitre.org/data/definitions/79.html"
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A03:2021 - Injection"
    message: "Stored XSS vulnerability detected: HTML sanitizer is configured to allow data URI schemes, enabling attackers to inject JavaScript via malicious data URLs in comments and content. This allows arbitrary JavaScript execution, session hijacking, and unauthorized actions. Fix by: 1) Remove 'data' from allowed URL schemes in HTML sanitizer configuration, 2) Implement Content Security Policy (CSP) that blocks data URLs, 3) Use strict allowlists for permitted URL schemes (http, https, mailto only), 4) Validate and sanitize all user input containing URLs with secure defaults."
    languages:
      - python
    severity: ERROR
    pattern-either:
      - pattern: |
          $SANITIZER = bleach.Cleaner(...)
          ...
          $SANITIZER.allowed_protocols.add("data")
      - pattern: |
          $SANITIZER = bleach.Cleaner(..., protocols=[..., "data", ...], ...)
      - pattern: |
          bleach.clean($INPUT, ..., protocols=[..., "data", ...], ...)
      - pattern: |
          bleach.linkify($INPUT, ..., protocols=[..., "data", ...], ...)
      - pattern: |
          def sanitize_html($INPUT):
              ...
              return bleach.clean($INPUT, protocols=[..., "data", ...])
      - pattern: |
          $ALLOWED_SCHEMES = [..., "data", ...]
          ...
          bleach.clean($INPUT, protocols=$ALLOWED_SCHEMES)
      - pattern: |
          $PROTOCOLS = [..., "data", ...]
          ...
          $SANITIZER = bleach.Cleaner(protocols=$PROTOCOLS)
      - pattern: |
          import html5lib
          ...
          $SANITIZER = html5lib.HTMLSanitizer()
          ...
          $SANITIZER.allowed_protocols.add("data")
      - pattern: |
          from markupsafe import Markup
          ...
          $HTML = Markup($INPUT)
          ...
          if "data:" in $HTML:
              return $HTML
      - pattern: |
          def render_comment($COMMENT):
              ...
              $SANITIZED = bleach.clean($COMMENT, protocols=[..., "data", ...])
              ...
              return render_template($TEMPLATE, content=$SANITIZED)
      - pattern: |
          def process_markdown($CONTENT):
              ...
              $CLEAN_HTML = bleach.clean($CONTENT, protocols=[..., "data", ...])
              ...
              return $CLEAN_HTML
    pattern-not-inside: |
      def $FUNC(...):
          ...
