rules:
  - id: autogen-remote-code-execution-ghsa-4j36-39gm-8vq8
    message: >-
      Remote Code Execution detected. User-controlled input from request parameters, command line arguments,
      or browser location is being passed to command execution or code evaluation functions without proper
      sanitization. This allows attackers to execute arbitrary system commands or JavaScript code. This
      vulnerability is particularly dangerous in synthetic monitoring contexts where untrusted Playwright
      code can access live browser objects. Always validate and sanitize user input before passing it to
      dangerous functions.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cve: GHSA-4j36-39gm-8vq8
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/OneUptime/oneuptime/security/advisories/GHSA-4j36-39gm-8vq8
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.body.$FIELD
      - pattern: req.query.$FIELD
      - pattern: req.params.$FIELD
      - pattern: location.search
      - pattern: document.URL
      - pattern: window.location
      - pattern: process.argv
      - pattern: process.argv[$INDEX]
      - pattern: process.env
      - pattern: process.env.$VAR
      - pattern: url.parse($URL).query
      - pattern: querystring.parse($QUERY)
      - pattern: querystring.parse($QUERY).$FIELD
      - pattern: JSON.parse($JSON)
      - pattern: JSON.parse($JSON).$FIELD
      - pattern: base64.decode($ENCODED)
      - pattern: atob($ENCODED)
      - pattern: Buffer.from($ENCODED, 'base64').toString()
      - pattern: $VAR.toString()
    pattern-propagators:
      - from: $FROM
        to: $TO
        patterns:
          - pattern-either:
              - pattern: $TO = base64.decode($FROM)
              - pattern: $TO = atob($FROM)
              - pattern: $TO = Buffer.from($FROM, 'base64').toString()
              - pattern: $TO = JSON.parse($FROM)
              - pattern: $TO = JSON.parse($FROM).$FIELD
              - pattern: $TO = url.parse($FROM).query
              - pattern: $TO = querystring.parse($FROM)
              - pattern: $TO = querystring.parse($FROM).$FIELD
    pattern-sanitizers:
      - pattern: sanitize($X)
      - pattern: escape($X)
      - pattern: validate($X)
      - pattern: escapeShellArg($X)
      - pattern: shellEscape($X)
      - pattern: $X.replace(/[;&|`$()]/g, "")
      - pattern: $X.replace(/[^a-zA-Z0-9]/g, "")
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: exec($CMD, ...)
              - pattern: execSync($CMD, ...)
              - pattern: spawn($CMD, ...)
              - pattern: spawnSync($CMD, ...)
              - pattern: child_process.exec($CMD, ...)
              - pattern: child_process.execSync($CMD, ...)
              - pattern: child_process.spawn($CMD, ...)
              - pattern: child_process.spawnSync($CMD, ...)
              - pattern: $CP.exec($CMD, ...)
              - pattern: $CP.execSync($CMD, ...)
              - pattern: $CP.spawn($CMD, ...)
              - pattern: $CP.spawnSync($CMD, ...)
              - pattern: eval($CODE)
              - pattern: Function($CODE)
              - pattern: new Function($CODE)
              - pattern: vm.runInNewContext($CODE, ...)
              - pattern: vm.runInThisContext($CODE, ...)
              - pattern: vm.runInContext($CODE, ...)
              - pattern: $VM.runInNewContext($CODE, ...)
              - pattern: $VM.runInThisContext($CODE, ...)
              - pattern: $VM.runInContext($CODE, ...)
          - pattern-not-inside: |
              const $VAR = "...";
              ...
          - pattern-not-inside: |
              let $VAR = "...";
              ...
          - pattern-not-inside: |
              var $VAR = "...";
              ...
          - pattern-not: exec("ls")
          - pattern-not: exec("pwd")  
          - pattern-not: exec("whoami")
          - pattern-not: execSync("ls")
          - pattern-not: execSync("pwd")
          - pattern-not: execSync("whoami")
          - pattern-not: eval("console.log('test')")
          - pattern-not: eval("1 + 1")