rules:
  - id: autogen-remote-code-execution-ghsa-4j36-39gm-8vq8
    message: >-
      Remote Code Execution via command injection detected. User-controlled input from request parameters
      (req.body, req.query, req.params) is being passed to command execution functions without proper
      sanitization. This allows attackers to execute arbitrary system commands on the server. Always
      validate and sanitize user input before passing it to command execution functions, or use
      parameterized commands with safe argument handling.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cve: GHSA-4j36-39gm-8vq8
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/OneUptime/oneuptime/security/advisories/GHSA-4j36-39gm-8vq8
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.body.$FIELD
      - pattern: req.query.$FIELD
      - pattern: req.params.$FIELD
      - pattern: location.search
      - pattern: document.URL
      - pattern: window.location
      - pattern: browser.$METHOD(...)
      - pattern: $BROWSER.$METHOD(...)
    pattern-sanitizers:
      - pattern: sanitize($X)
      - pattern: escape($X)
      - pattern: validate($X)
      - pattern: escapeShellArg($X)
      - pattern: shellEscape($X)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: exec($CMD, ...)
              - pattern: execSync($CMD, ...)
              - pattern: spawn($CMD, ...)
              - pattern: child_process.exec($CMD, ...)
              - pattern: child_process.execSync($CMD, ...)
              - pattern: child_process.spawn($CMD, ...)
              - pattern: $CP.exec($CMD, ...)
              - pattern: $CP.execSync($CMD, ...)
              - pattern: $CP.spawn($CMD, ...)
          - focus-metavariable: $CMD
          - pattern-not: exec("ls")
          - pattern-not: exec("pwd")
          - pattern-not: exec("whoami")
          - pattern-not: execSync("ls")
          - pattern-not: execSync("pwd")
          - pattern-not: execSync("whoami")