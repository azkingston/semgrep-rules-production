rules:
  - id: autogen-remote-code-execution-rce-ghsa-h343-gg57-2q67
    message: >-
      Remote Code Execution via unsandboxed vm execution detected. User-controlled code from request parameters
      (req.body, req.query, req.params) is being executed in Node.js vm module without proper sandboxing.
      The vm module is not a security boundary and can be escaped using prototype chain manipulation
      (this.constructor.constructor) to gain access to the underlying Node.js process object and execute
      arbitrary system commands. Always validate and sanitize user input before execution, or use proper
      sandboxing solutions instead of the vm module for untrusted code execution.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cve: GHSA-h343-gg57-2q67
      cwe: "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://github.com/OneUptime/oneuptime/security/advisories/GHSA-h343-gg57-2q67
    mode: taint
    pattern-sources:
      - pattern: req.body
      - pattern: req.query
      - pattern: req.params
      - pattern: req.body.$FIELD
      - pattern: req.query.$FIELD
      - pattern: req.params.$FIELD
      - pattern: location.search
      - pattern: document.URL
      - pattern: window.location
    pattern-sanitizers:
      - pattern: sanitize($X)
      - pattern: escape($X)
      - pattern: validate($X)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: vm.runInNewContext($CODE, ...)
              - pattern: vm.runInThisContext($CODE, ...)
              - pattern: vm.runInContext($CODE, ...)
              - pattern: $VM.runInNewContext($CODE, ...)
              - pattern: $VM.runInThisContext($CODE, ...)
              - pattern: $VM.runInContext($CODE, ...)
          - focus-metavariable: $CODE